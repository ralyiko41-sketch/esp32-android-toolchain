name: Build ESP32 Toolchain for Android ARM64

on:
  workflow_dispatch:
  push:
    branches: [ main ]

env:
  ESP_GCC_TAG:      "esp-2021r2"
  ESP_BINUTILS_TAG: "esp-2021r2-binutils"
  NEWLIB_VERSION:   "4.1.0"
  GMP_VERSION:      "6.2.1"
  MPFR_VERSION:     "4.2.0"
  MPC_VERSION:      "1.3.1"
  ISL_VERSION:      "0.24"

  NDK_VERSION:      "r26d"
  ANDROID_API:      "21"

  TARGET:           "xtensa-esp-elf"
  HOST_TRIPLE:      "aarch64-linux-android"

  NATIVE_GCC_TAG:   "esp-2021r2"

  NDK_HOME:         "${{ github.workspace }}/ndk"
  NDK_SYSROOT:      "${{ github.workspace }}/ndk/toolchains/llvm/prebuilt/linux-x86_64/sysroot"
  LLVM_BIN:         "${{ github.workspace }}/ndk/toolchains/llvm/prebuilt/linux-x86_64/bin"
  WRAP:             "${{ github.workspace }}/ndk-wrap"
  WORK:             "${{ github.workspace }}/work"
  HOST_DEPS:        "${{ github.workspace }}/host-deps"
  NATIVE_TOOLS_DIR: "${{ github.workspace }}/native-build-tools"
  BUILD_TIME_TOOLS: "${{ github.workspace }}/native-build-tools/renamed-bin"
  PREFIX:           "${{ github.workspace }}/staging/esp-2021r2-patch5/xtensa-esp-elf"

jobs:
  build-toolchain:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:
      - uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            autoconf automake bison flex gawk \
            libgmp-dev libmpfr-dev libmpc-dev \
            libssl-dev libtool make patch \
            python3 texinfo unzip wget xz-utils \
            zlib1g-dev build-essential binutils-dev

      - name: Cache NDK
        id: cache-ndk
        uses: actions/cache@v4
        with:
          path: ${{ env.NDK_HOME }}
          key: ndk-${{ env.NDK_VERSION }}-v1

      - name: Download NDK
        if: steps.cache-ndk.outputs.cache-hit != 'true'
        run: |
          wget -q \
            "https://dl.google.com/android/repository/android-ndk-${NDK_VERSION}-linux.zip" \
            -O /tmp/ndk.zip
          unzip -q /tmp/ndk.zip -d /tmp
          mv "/tmp/android-ndk-${NDK_VERSION}" "${NDK_HOME}"
          rm /tmp/ndk.zip

      - name: Verify NDK
        run: |
          "${LLVM_BIN}/aarch64-linux-android${ANDROID_API}-clang" --version | head -1
          echo "NDK OK"

      - name: Create NDK compiler wrappers
        run: |
          mkdir -p "${WRAP}"

          cat > "${WRAP}/aarch64-linux-android-gcc" << 'EOF'
          #!/bin/sh
          exec "${LLVM_BIN}/clang" --target=aarch64-linux-android${ANDROID_API} --sysroot="${NDK_SYSROOT}" "$@"
          EOF

          cat > "${WRAP}/aarch64-linux-android-g++" << 'EOF'
          #!/bin/sh
          exec "${LLVM_BIN}/clang++" --target=aarch64-linux-android${ANDROID_API} --sysroot="${NDK_SYSROOT}" "$@"
          EOF

          chmod +x "${WRAP}/aarch64-linux-android-gcc" "${WRAP}/aarch64-linux-android-g++"

          for tool in ar ranlib strip nm objcopy objdump as readelf; do
            ln -sf "${LLVM_BIN}/llvm-${tool}" "${WRAP}/aarch64-linux-android-${tool}"
          done

          if [ -f "${LLVM_BIN}/ld.lld" ]; then
            ln -sf "${LLVM_BIN}/ld.lld" "${WRAP}/aarch64-linux-android-ld"
          else
            ln -sf "${LLVM_BIN}/lld" "${WRAP}/aarch64-linux-android-ld"
          fi

          echo "Wrappers created:"
          ls -la "${WRAP}/"

          echo 'int main(void){return 0;}' > /tmp/test.c
          PATH="${WRAP}:${LLVM_BIN}:${PATH}" \
            aarch64-linux-android-gcc /tmp/test.c -o /tmp/test.out

          if [ $? -eq 0 ]; then
            echo "Smoke test PASSED"
            readelf -d /tmp/test.out | grep -q "libc.so" && echo "Bionic libc detected"
          else
            echo "Smoke test FAILED"
            exit 1
          fi

      - name: Cache native build-time toolchain
        id: cache-native-tools
        uses: actions/cache@v4
        with:
          path: ${{ env.NATIVE_TOOLS_DIR }}
          key: native-tools-${{ env.NATIVE_GCC_TAG }}-v1

      - name: Download native build-time toolchain (x86_64)
        if: steps.cache-native-tools.outputs.cache-hit != 'true'
        run: |
          mkdir -p "${NATIVE_TOOLS_DIR}"
          cd "${NATIVE_TOOLS_DIR}"

          wget -q --retry-connrefused --tries=5 --timeout=60 --progress=dot:mega \
            "https://github.com/espressif/crosstool-NG/releases/download/${NATIVE_GCC_TAG}/xtensa-esp32-elf-gcc8_4_0-${NATIVE_GCC_TAG}-linux-amd64.tar.gz" \
            -O native-toolchain.tar.gz

          tar -xzf native-toolchain.tar.gz
          rm native-toolchain.tar.gz

          ls -la .

      - name: Prepare native build-time tools (rename to match TARGET)
        run: |
          mkdir -p "${BUILD_TIME_TOOLS}"

          NATIVE_BIN_DIR=$(dirname "$(find "${NATIVE_TOOLS_DIR}" -name 'xtensa-esp32-elf-gcc' -not -name '*.exe' | head -1)")

          if [ -z "${NATIVE_BIN_DIR}" ] || [ ! -d "${NATIVE_BIN_DIR}" ]; then
            echo "ERROR: could not locate extracted native toolchain bin directory"
            find "${NATIVE_TOOLS_DIR}" -maxdepth 3
            exit 1
          fi

          echo "Found native bin dir: ${NATIVE_BIN_DIR}"

          for f in "${NATIVE_BIN_DIR}"/xtensa-esp32-elf-*; do
            base=$(basename "$f")
            suffix="${base#xtensa-esp32-elf-}"
            ln -sf "$f" "${BUILD_TIME_TOOLS}/xtensa-esp-elf-${suffix}"
          done

          echo "--- Renamed build-time tools ---"
          ls -la "${BUILD_TIME_TOOLS}/"

          "${BUILD_TIME_TOOLS}/xtensa-esp-elf-gcc" --version | head -1
          echo "Native build-time compiler runs on this host"

      - name: Cache source tarballs
        id: cache-src
        uses: actions/cache@v4
        with:
          path: ${{ github.workspace }}/tarballs
          key: src-${{ env.ESP_GCC_TAG }}-${{ env.ESP_BINUTILS_TAG }}-newlib-${{ env.NEWLIB_VERSION }}-isl${{ env.ISL_VERSION }}-v1

      - name: Download source tarballs
        if: steps.cache-src.outputs.cache-hit != 'true'
        run: |
          mkdir -p "${GITHUB_WORKSPACE}/tarballs"
          cd "${GITHUB_WORKSPACE}/tarballs"

          wget_r() {
            wget --retry-connrefused --tries=5 --timeout=60 --progress=dot:mega "$1" -O "$2"
          }

          wget_r "https://codeload.github.com/espressif/gcc/tar.gz/refs/tags/${ESP_GCC_TAG}" "esp-gcc.tar.gz"
          wget_r "https://codeload.github.com/espressif/binutils-gdb/tar.gz/refs/tags/${ESP_BINUTILS_TAG}" "esp-binutils.tar.gz"
          wget_r "https://sourceware.org/pub/newlib/newlib-${NEWLIB_VERSION}.tar.gz" "newlib.tar.gz"
          wget_r "https://ftpmirror.gnu.org/gmp/gmp-${GMP_VERSION}.tar.xz" "gmp.tar.xz"
          wget_r "https://www.mpfr.org/mpfr-${MPFR_VERSION}/mpfr-${MPFR_VERSION}.tar.xz" "mpfr.tar.xz"
          wget_r "https://ftp.gnu.org/gnu/mpc/mpc-${MPC_VERSION}.tar.gz" "mpc.tar.gz"
          wget_r "https://libisl.sourceforge.io/isl-${ISL_VERSION}.tar.xz" "isl.tar.xz"

          ls -lh .

      - name: Extract sources
        run: |
          mkdir -p "${WORK}/src"
          cd "${WORK}/src"

          for f in esp-binutils esp-gcc newlib gmp mpfr mpc isl; do
            tarball=$(ls "${GITHUB_WORKSPACE}/tarballs/${f}".tar.* 2>/dev/null | head -1)
            tar -xf "${tarball}"
          done

          echo "--- Extracted ---"
          ls -la .

          echo "BINUTILS_DIR=${WORK}/src/$(ls -d binutils-gdb-* | head -1)" >> $GITHUB_ENV
          echo "GCC_DIR=${WORK}/src/$(ls -d gcc-* | head -1)" >> $GITHUB_ENV
          echo "NEWLIB_DIR=${WORK}/src/$(ls -d newlib-* | head -1)" >> $GITHUB_ENV
          echo "GMP_DIR=${WORK}/src/$(ls -d gmp-* | head -1)" >> $GITHUB_ENV
          echo "MPFR_DIR=${WORK}/src/$(ls -d mpfr-* | head -1)" >> $GITHUB_ENV
          echo "MPC_DIR=${WORK}/src/$(ls -d mpc-* | head -1)" >> $GITHUB_ENV
          echo "ISL_DIR=${WORK}/src/$(ls -d isl-* | head -1)" >> $GITHUB_ENV

      # ── FIX: lib2funcs.S / crti.S / crtn.S contain ESP32-specific Xtensa
      #         opcodes (dhwb, lhi) that the prebuilt native x86_64 assembler
      #         does not recognise -> "unknown opcode" during all-target-libgcc.
      #         These are optional cache-flush asm optimisations; GCC has C
      #         fallbacks for every routine they define. Stubbing them out lets
      #         the Canadian Cross build proceed without any loss of correctness.
      - name: Patch GCC sources - stub out Xtensa asm files
        run: |
          for f in \
            "${GCC_DIR}/libgcc/config/xtensa/lib2funcs.S" \
            "${GCC_DIR}/libgcc/config/xtensa/crti.S" \
            "${GCC_DIR}/libgcc/config/xtensa/crtn.S"
          do
            if [ -f "$f" ]; then
              echo "/* empty: ESP32 asm removed for Canadian Cross build */" > "$f"
              echo "Patched: $f"
            fi
          done

      - name: Build GMP for Android host
        run: |
          export PATH="${WRAP}:${LLVM_BIN}:${PATH}"
          mkdir -p "${WORK}/build-gmp" && cd "${WORK}/build-gmp"
          "${GMP_DIR}/configure" \
            --build=x86_64-linux-gnu --host="${HOST_TRIPLE}" \
            --prefix="${HOST_DEPS}" \
            --disable-shared --enable-static \
            CC="aarch64-linux-android-gcc" \
            AR="${WRAP}/aarch64-linux-android-ar" \
            RANLIB="${WRAP}/aarch64-linux-android-ranlib"
          make -j$(nproc) && make install

      - name: Build MPFR for Android host
        run: |
          export PATH="${WRAP}:${LLVM_BIN}:${PATH}"
          mkdir -p "${WORK}/build-mpfr" && cd "${WORK}/build-mpfr"
          "${MPFR_DIR}/configure" \
            --build=x86_64-linux-gnu --host="${HOST_TRIPLE}" \
            --prefix="${HOST_DEPS}" --with-gmp="${HOST_DEPS}" \
            --disable-shared --enable-static \
            CC="aarch64-linux-android-gcc" \
            AR="${WRAP}/aarch64-linux-android-ar" \
            RANLIB="${WRAP}/aarch64-linux-android-ranlib"
          make -j$(nproc) && make install

      - name: Build MPC for Android host
        run: |
          export PATH="${WRAP}:${LLVM_BIN}:${PATH}"
          mkdir -p "${WORK}/build-mpc" && cd "${WORK}/build-mpc"
          "${MPC_DIR}/configure" \
            --build=x86_64-linux-gnu --host="${HOST_TRIPLE}" \
            --prefix="${HOST_DEPS}" \
            --with-gmp="${HOST_DEPS}" --with-mpfr="${HOST_DEPS}" \
            --disable-shared --enable-static \
            CC="aarch64-linux-android-gcc" \
            AR="${WRAP}/aarch64-linux-android-ar" \
            RANLIB="${WRAP}/aarch64-linux-android-ranlib"
          make -j$(nproc) && make install

      - name: Build ISL for Android host
        run: |
          export PATH="${WRAP}:${LLVM_BIN}:${PATH}"
          mkdir -p "${WORK}/build-isl" && cd "${WORK}/build-isl"
          "${ISL_DIR}/configure" \
            --build=x86_64-linux-gnu --host="${HOST_TRIPLE}" \
            --prefix="${HOST_DEPS}" --with-gmp-prefix="${HOST_DEPS}" \
            --disable-shared --enable-static \
            CC="aarch64-linux-android-gcc" \
            AR="${WRAP}/aarch64-linux-android-ar" \
            RANLIB="${WRAP}/aarch64-linux-android-ranlib"
          make -j$(nproc) && make install

      - name: Build Binutils
        run: |
          export PATH="${WRAP}:${LLVM_BIN}:${PATH}"
          mkdir -p "${WORK}/build-binutils" && cd "${WORK}/build-binutils"
          "${BINUTILS_DIR}/configure" \
            --build=x86_64-linux-gnu \
            --host="${HOST_TRIPLE}" \
            --target="${TARGET}" \
            --prefix="${PREFIX}" \
            --with-sysroot="${NDK_SYSROOT}" \
            --disable-nls --disable-werror \
            --disable-sim --disable-gdb \
            CC="aarch64-linux-android-gcc" \
            CXX="aarch64-linux-android-g++" \
            AR="${WRAP}/aarch64-linux-android-ar" \
            RANLIB="${WRAP}/aarch64-linux-android-ranlib"
          make -j$(nproc) all-binutils all-gas all-ld
          make install-binutils install-gas install-ld

      # ── FIX: BUILD_TIME_TOOLS before PREFIX/bin so the x86_64-runnable
      #         xtensa-esp-elf-nm/ar/ranlib are found before the Android ARM64
      #         copies installed by the Binutils step above.
      #         *_FOR_TARGET vars are pinned explicitly so there is no
      #         PATH-lookup ambiguity inside the libgcc sub-make.
      - name: Build GCC Stage 1 (bootstrap C only)
        run: |
          export PATH="${BUILD_TIME_TOOLS}:${PREFIX}/bin:${WRAP}:${LLVM_BIN}:${PATH}"
          mkdir -p "${WORK}/build-gcc-s1" && cd "${WORK}/build-gcc-s1"
          "${GCC_DIR}/configure" \
            --build=x86_64-linux-gnu \
            --host="${HOST_TRIPLE}" \
            --target="${TARGET}" \
            --prefix="${PREFIX}" \
            --with-gmp="${HOST_DEPS}" \
            --with-mpfr="${HOST_DEPS}" \
            --with-mpc="${HOST_DEPS}" \
            --with-isl="${HOST_DEPS}" \
            --with-build-time-tools="${BUILD_TIME_TOOLS}" \
            --enable-languages=c \
            --without-headers \
            --with-newlib \
            --disable-shared --disable-threads \
            --disable-libssp --disable-libquadmath \
            --disable-libgomp --disable-libvtv \
            --disable-libatomic \
            --disable-nls --disable-werror --disable-multilib \
            CC="aarch64-linux-android-gcc" \
            CXX="aarch64-linux-android-g++" \
            AR="${WRAP}/aarch64-linux-android-ar" \
            RANLIB="${WRAP}/aarch64-linux-android-ranlib" \
            NM_FOR_TARGET="${BUILD_TIME_TOOLS}/${TARGET}-nm" \
            AR_FOR_TARGET="${BUILD_TIME_TOOLS}/${TARGET}-ar" \
            RANLIB_FOR_TARGET="${BUILD_TIME_TOOLS}/${TARGET}-ranlib" \
            OBJDUMP_FOR_TARGET="${BUILD_TIME_TOOLS}/${TARGET}-objdump" \
            STRIP_FOR_TARGET="${BUILD_TIME_TOOLS}/${TARGET}-strip" \
            CFLAGS_FOR_TARGET="-O2 -mlongcalls"
          make -j$(nproc) all-gcc
          make install-gcc
          make -j$(nproc) all-target-libgcc
          make install-target-libgcc

      - name: Build Newlib
        run: |
          export PATH="${PREFIX}/bin:${WRAP}:${LLVM_BIN}:${PATH}"
          mkdir -p "${WORK}/build-newlib" && cd "${WORK}/build-newlib"
          "${NEWLIB_DIR}/configure" \
            --build=x86_64-linux-gnu \
            --host="${TARGET}" \
            --target="${TARGET}" \
            --prefix="${PREFIX}" \
            --enable-newlib-io-long-long \
            --enable-newlib-register-fini \
            --disable-newlib-supplied-syscalls \
            CC_FOR_TARGET="${TARGET}-gcc" \
            CXX_FOR_TARGET="${TARGET}-g++" \
            AR_FOR_TARGET="${TARGET}-ar" \
            RANLIB_FOR_TARGET="${TARGET}-ranlib" \
            CFLAGS_FOR_TARGET="-O2 -ffunction-sections -fdata-sections"
          make -j$(nproc)
          make install

          if [ ! -f "${PREFIX}/${TARGET}/include/stdio.h" ]; then
            echo "ERROR: stdio.h not found"
            exit 1
          fi
          ln -sf "${PREFIX}/${TARGET}/include" "${PREFIX}/${TARGET}/sys-include"

      # ── Same PATH reorder + *_FOR_TARGET pins as Stage 1.
      - name: Build GCC Stage 2 (final C + C++)
        run: |
          export PATH="${BUILD_TIME_TOOLS}:${PREFIX}/bin:${WRAP}:${LLVM_BIN}:${PATH}"
          mkdir -p "${WORK}/build-gcc-s2" && cd "${WORK}/build-gcc-s2"
          "${GCC_DIR}/configure" \
            --build=x86_64-linux-gnu \
            --host="${HOST_TRIPLE}" \
            --target="${TARGET}" \
            --prefix="${PREFIX}" \
            --with-gmp="${HOST_DEPS}" \
            --with-mpfr="${HOST_DEPS}" \
            --with-mpc="${HOST_DEPS}" \
            --with-isl="${HOST_DEPS}" \
            --with-build-time-tools="${BUILD_TIME_TOOLS}" \
            --with-newlib \
            --with-headers="${PREFIX}/${TARGET}/include" \
            --with-sysroot="${PREFIX}/${TARGET}" \
            --enable-languages=c,c++ \
            --disable-shared --disable-threads \
            --disable-libssp --disable-libquadmath \
            --disable-libgomp --disable-libvtv \
            --disable-libatomic \
            --disable-nls --disable-werror --disable-multilib \
            CC="aarch64-linux-android-gcc" \
            CXX="aarch64-linux-android-g++" \
            AR="${WRAP}/aarch64-linux-android-ar" \
            RANLIB="${WRAP}/aarch64-linux-android-ranlib" \
            NM_FOR_TARGET="${BUILD_TIME_TOOLS}/${TARGET}-nm" \
            AR_FOR_TARGET="${BUILD_TIME_TOOLS}/${TARGET}-ar" \
            RANLIB_FOR_TARGET="${BUILD_TIME_TOOLS}/${TARGET}-ranlib" \
            OBJDUMP_FOR_TARGET="${BUILD_TIME_TOOLS}/${TARGET}-objdump" \
            STRIP_FOR_TARGET="${BUILD_TIME_TOOLS}/${TARGET}-strip" \
            CFLAGS_FOR_TARGET="-O2 -mlongcalls"
          make -j$(nproc) all-gcc
          make install-gcc
          make -j$(nproc) all-target-libgcc
          make install-target-libgcc
          make -j$(nproc) all-target-libstdc++-v3
          make install-target-libstdc++-v3

      - name: Strip host binaries
        run: |
          for f in "${PREFIX}/bin/xtensa-esp-elf-"*; do
            if [ -f "$f" ] && ! [ -L "$f" ]; then
              file "$f" | grep -q ELF && "${LLVM_BIN}/llvm-strip" --strip-unneeded "$f" 2>/dev/null || true
            fi
          done
          du -sh "${PREFIX}"

      - name: Verify toolchain
        run: |
          GCC="${PREFIX}/bin/${TARGET}-gcc"
          file "${GCC}"
          echo "=== Checking Bionic linkage ==="
          readelf -d "${GCC}" | grep -q "libc.so" && echo "Bionic libc detected" || echo "WARNING: libc.so not found in NEEDED"
          echo "=== Testing compile ==="
          echo 'int add(int a,int b){return a+b;}' > /tmp/test.c
          "${GCC}" -c -nostdlib /tmp/test.c -o /tmp/test.o
          file /tmp/test.o | grep -q "ELF" && echo "Compiles Xtensa object OK" || exit 1
          echo "Toolchain verified"

      - name: Package toolchain
        run: |
          cd "${GITHUB_WORKSPACE}/staging"
          tar -czf "${GITHUB_WORKSPACE}/toolchain-android-arm64.tar.gz" "esp-2021r2-patch5"
          sha256sum "${GITHUB_WORKSPACE}/toolchain-android-arm64.tar.gz" > "${GITHUB_WORKSPACE}/toolchain-android-arm64.tar.gz.sha256"
          ls -lh "${GITHUB_WORKSPACE}/toolchain-android-arm64.tar.gz"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: toolchain-android-arm64
          path: |
            toolchain-android-arm64.tar.gz
            toolchain-android-arm64.tar.gz.sha256
          retention-days: 30

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            toolchain-android-arm64.tar.gz
            toolchain-android-arm64.tar.gz.sha256
          body: |
            ## ESP32 Android ARM64 Toolchain
            | | |
            |---|---|
            | **Host** | aarch64-linux-android21 (Bionic) |
            | **Target** | xtensa-esp-elf |
            | **GCC** | ${{ env.ESP_GCC_TAG }} |
            | **Binutils** | ${{ env.ESP_BINUTILS_TAG }} |
            | **Newlib** | ${{ env.NEWLIB_VERSION }} |
            | **NDK** | ${{ env.NDK_VERSION }} |