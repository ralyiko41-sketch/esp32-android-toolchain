name: Build ESP32 Android Toolchain

on:
  workflow_dispatch:
  push:
    branches: [main]

jobs:
  build-toolchain:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Android NDK r26b
        uses: nttld/setup-ndk@v1
        id: setup-ndk
        with:
          ndk-version: r26b

      - name: Install System Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            autoconf automake bison flex gawk help2man libtool-bin \
            libncurses5-dev libssl-dev make patch python3 python3-pip \
            texinfo unzip wget xz-utils gcc g++ git cmake crossbuild-essential-arm64

      - name: Clone and Bootstrap Espressif Crosstool-NG
        run: |
          git clone --recursive https://github.com/espressif/crosstool-NG.git
          cd crosstool-NG
          # Upgraded to a modern Espressif compiler core release branch
          git checkout esp-13.2.0_20240530
          ./bootstrap
          ./configure --enable-local
          make -j$(nproc)

      - name: Configure and Run Canadian Cross Build
        run: |
          cd crosstool-NG
          
          # Initialize the base target profile for the ESP32 chip
          ./ct-ng xtensa-esp32-elf
          
          # Extract absolute NDK paths for the compilation environment
          NDK_PATH="${{ steps.setup-ndk.outputs.ndk-path }}"
          TOOLCHAIN_BIN="$NDK_PATH/toolchains/llvm/prebuilt/linux-x86_64/bin"
          SYSROOT_PATH="$NDK_PATH/toolchains/llvm/prebuilt/linux-x86_64/sysroot"
          
          # Inject explicit Canadian Cross settings and the host sysroot path
          cat >> .config << EOF
          CT_REALLY_BE_EXPERIMENTAL=y
          CT_CANADIAN=y
          CT_HOST="aarch64-linux-android23"
          CT_HOST_SYSROOT="$SYSROOT_PATH"
          CT_OMIT_TARGET_SUPPORT=y
          EOF
          
          # Force crosstool-ng to recalculate internal dependencies cleanly
          ./ct-ng olddefconfig
          
          # Explicitly export the NDK LLVM tools to prevent desktop leakage
          export PATH="$TOOLCHAIN_BIN:$PATH"
          export CC="$TOOLCHAIN_BIN/aarch64-linux-android23-clang"
          export CXX="$TOOLCHAIN_BIN/aarch64-linux-android23-clang++"
          export AR="$TOOLCHAIN_BIN/llvm-ar"
          export RANLIB="$TOOLCHAIN_BIN/llvm-ranlib"
          export STRIP="$TOOLCHAIN_BIN/llvm-strip"
          
          # Build the toolchain
          ./ct-ng build.$(nproc) || {
            echo "=== BUILD FAILED ==="
            echo "Showing last 200 lines of build.log:"
            tail -n 200 build.log
            exit 1
          }

      - name: Package Toolchain Artifacts
        run: |
          mkdir -p ${{ github.workspace }}/output
          
          # Dynamically locate the built toolchain folder structure
          TARGET_DIR=$(find ${HOME}/x-tools -maxdepth 3 -name "xtensa-esp32-elf" -type d | head -n 1)
          
          if [ -z "$TARGET_DIR" ]; then
            echo "Error: Could not find compiled xtensa-esp32-elf directory!"
            find ${HOME}/x-tools
            exit 1
          fi
          
          echo "Found toolchain folder at: $TARGET_DIR"
          cp -r "$TARGET_DIR" ${{ github.workspace }}/output/
          
          cd ${{ github.workspace }}/output
          tar -czvf ../toolchain-android-arm64.tar.gz xtensa-esp32-elf/

      - name: Upload Finished Artifact
        uses: actions/upload-artifact@v4
        with:
          name: esp32-android-toolchain-arm64
          path: toolchain-android-arm64.tar.gz
          retention-days: 30