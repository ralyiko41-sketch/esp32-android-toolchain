name: Build ESP32 Android Toolchain

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  build-toolchain:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Android NDK r26b
        uses: nttld/setup-ndk@v1
        id: setup-ndk
        with:
          ndk-version: 'r26b'

      - name: Install System Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y autoconf automake bison flex gawk help2man libtool-bin libncurses5-dev libssl-dev make patch python3 python3-pip texinfo unzip wget xz-utils gcc g++ git cmake crossbuild-essential-arm64

      - name: Clone and Bootstrap Espressif Crosstool-NG
        run: |
          git clone --recursive https://github.com/espressif/crosstool-NG.git
          cd crosstool-NG
          git checkout esp-13.2.0_20240530
          ./bootstrap
          ./configure --enable-local
          make -j$(nproc)

      - name: Configure and Run Canadian Cross Build
        run: |
          cd crosstool-NG
          ./ct-ng xtensa-esp32-elf
          NDK_PATH="${{ steps.setup-ndk.outputs.ndk-path }}"
          TOOLCHAIN_BIN="$NDK_PATH/toolchains/llvm/prebuilt/linux-x86_64/bin"
          SYSROOT_PATH="$NDK_PATH/toolchains/llvm/prebuilt/linux-x86_64/sysroot"
          mkdir -p wrapper_bin
          ln -s "$TOOLCHAIN_BIN/llvm-ar" "wrapper_bin/aarch64-linux-android23-ar"
          ln -s "$TOOLCHAIN_BIN/llvm-ranlib" "wrapper_bin/aarch64-linux-android23-ranlib"
          ln -s "$TOOLCHAIN_BIN/llvm-strip" "wrapper_bin/aarch64-linux-android23-strip"
          ln -s "$TOOLCHAIN_BIN/llvm-objcopy" "wrapper_bin/aarch64-linux-android23-objcopy"
          ln -s "$TOOLCHAIN_BIN/llvm-objdump" "wrapper_bin/aarch64-linux-android23-objdump"
          ln -s "$TOOLCHAIN_BIN/llvm-readelf" "wrapper_bin/aarch64-linux-android23-readelf"
          export PATH="$PWD/wrapper_bin:$TOOLCHAIN_BIN:$PATH"
          echo "CT_REALLY_BE_EXPERIMENTAL=y" >> .config
          echo "CT_CANADIAN=y" >> .config
          echo "CT_HOST=\"aarch64-linux-android23\"" >> .config
          echo "CT_HOST_SYSROOT=\"$SYSROOT_PATH\"" >> .config
          echo "CT_OMIT_TARGET_SUPPORT=y" >> .config
          echo "CT_HOST_CC=\"aarch64-linux-android23-clang\"" >> .config
          echo "CT_HOST_CXX=\"aarch64-linux-android23-clang++\"" >> .config
          ./ct-ng olddefconfig
          
          # THE FIX: Wipe out GitHub's default environment variables
          # so crosstool-NG doesn't panic and abort during sanity checks.
          unset LD_LIBRARY_PATH
          unset LIBRARY_PATH
          unset CFLAGS
          unset CXXFLAGS
          unset LDFLAGS
          
          ./ct-ng build.$(nproc)

      - name: Package Toolchain Artifacts
        run: |
          mkdir -p ${{ github.workspace }}/output
          TARGET_DIR=$(find ${HOME}/x-tools -maxdepth 3 -name "xtensa-esp32-elf" -type d | head -n 1)
          cp -r "$TARGET_DIR" ${{ github.workspace }}/output/
          cd ${{ github.workspace }}/output
          tar -czvf ../toolchain-android-arm64.tar.gz xtensa-esp32-elf/

      - name: Upload Finished Artifact
        uses: actions/upload-artifact@v4
        with:
          name: esp32-android-toolchain-arm64
          path: toolchain-android-arm64.tar.gz
          retention-days: 30