name: Build ESP32 Android Toolchain

on:
  workflow_dispatch:
  push:
    branches: [main]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-toolchain:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Android NDK r26b
        uses: nttld/setup-ndk@v1
        id: setup-ndk
        with:
          ndk-version: r26b

      - name: Install System Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            autoconf automake bison flex gawk help2man libtool-bin \
            libncurses5-dev libssl-dev make patch python3 python3-pip \
            texinfo unzip wget xz-utils gcc g++ git cmake crossbuild-essential-arm64

      - name: Clone Espressif Crosstool-NG
        run: |
          # We grab Espressif's official, pre-configured toolchain builder
          git clone --recursive https://github.com/espressif/crosstool-NG.git
          cd crosstool-NG
          # Switch to the stable release branch for the esp-2021r2 toolchain
          git checkout esp-2021r2-patch5
          ./bootstrap
          ./configure --enable-local
          make -j$(nproc)

      - name: Configure and Run Canadian Cross Build
        run: |
          cd crosstool-NG
          
          # Load the pre-configured default profile for the ESP32 chip
          ./ct-ng xtensa-esp32-elf
          
          # Inject our Android cross-compilation target into the configuration variables
          NDK_PATH="${{ steps.setup-ndk.outputs.ndk-path }}"
          TOOLCHAIN_BIN="$NDK_PATH/toolchains/llvm/prebuilt/linux-x86_64/bin"
          SYSROOT_PATH="$NDK_PATH/toolchains/llvm/prebuilt/linux-x86_64/sysroot"
          
          cat >> .config << EOF
          CT_REALLY_BE_EXPERIMENTAL=y
          CT_CANADIAN=y
          CT_HOST="aarch64-linux-android23"
          CT_HOST_PREFIX="aarch64-linux-android23-"
          CT_OMIT_TARGET_SUPPORT=y
          EOF
          
          # Update the internal dependencies
          ./ct-ng olddefconfig
          
          # Run the automated compilation sequence
          export PATH="$TOOLCHAIN_BIN:$PATH"
          ./ct-ng build.$(nproc)

      - name: Package Toolchain Artifacts
        run: |
          mkdir -p ${{ github.workspace }}/output
          cp -r ${HOME}/x-tools/xtensa-esp32-elf ${{ github.workspace }}/output/
          cd ${{ github.workspace }}/output
          tar -czvf ../toolchain-android-arm64.tar.gz xtensa-esp32-elf/

      - name: Upload Finished Artifact
        uses: actions/upload-artifact@v4
        with:
          name: esp32-android-toolchain-arm64
          path: toolchain-android-arm64.tar.gz
          retention-days: 30